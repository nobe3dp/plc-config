<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAO C6 PLC Configuration</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --sysmac-dark: #2d3436;
            --sysmac-bg: #e0e4e7;
            --sysmac-card: #f5f7f9;
            --sysmac-accent: #f39c12;
            --sysmac-blue: #2c3e50;
            --sysmac-border: #bdc3c7;
        }
        body {
            background-color: var(--sysmac-bg); color: var(--sysmac-dark);
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: var(--sysmac-card); border-radius: 4px;
            width: 100%; max-width: 420px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 1px solid var(--sysmac-border); overflow: hidden;
        }
        .header {
            background: var(--sysmac-blue); color: white;
            padding: 12px 20px; font-size: 1rem; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }
        .content { padding: 25px; }
        .group { margin-bottom: 15px; }
        label { 
            display: block; font-size: 0.8rem; font-weight: bold;
            margin-bottom: 5px; color: #4b5563; text-transform: uppercase;
        }
        input {
            width: 100%; padding: 10px; border-radius: 2px; border: 1px solid var(--sysmac-border);
            background: white; color: var(--sysmac-dark); font-size: 1rem; box-sizing: border-box;
        }
        input:focus { outline: 2px solid var(--sysmac-accent); border-color: transparent; }
        .btn-stack { display: flex; gap: 8px; margin-top: 25px; }
        button {
            flex: 1; padding: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.1);
            font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.9rem;
        }
        #readBtn { background: #dcdde1; color: var(--sysmac-dark); }
        #writeBtn { background: var(--sysmac-accent); color: white; }
        #status {
            background: #f1f2f6; padding: 10px; border-top: 1px solid var(--sysmac-border);
            font-size: 0.8rem; text-align: left; color: #636e72;
            display: flex; align-items: center; gap: 8px; min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i data-lucide="settings-2" size="18"></i>
            XIAO C6 Configuration Tool
        </div>
        <div class="content">
            <div class="group">
                <label>Communication: WiFi SSID</label>
                <input type="text" id="ssid" spellcheck="false" autocomplete="off">
            </div>
            <div class="group">
                <label>Security: Password</label>
                <input type="password" id="pass" autocomplete="off">
            </div>
            <div class="group">
                <label>Ethernet: PLC IP Address</label>
                <input type="text" id="ip" placeholder="192.168.1.1" autocomplete="off">
            </div>
            <div class="group">
                <label>Variable: Device No (D-Register)</label>
                <input type="number" id="dev" value="500" autocomplete="off">
            </div>
            <div class="btn-stack">
                <button id="readBtn"><i data-lucide="download"></i> Read from ESP</button>
                <button id="writeBtn"><i data-lucide="upload"></i> Transfer to ESP</button>
            </div>
        </div>
        <div id="status">
            <i data-lucide="info" size="14"></i>
            <span id="statusText">Ready to connect</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        const setStatus = (msg, color = "#636e72") => {
            const txt = document.getElementById('statusText');
            txt.innerText = msg;
            txt.parentElement.style.color = color;
        };

        async function getCharacteristic() {
            setStatus("Searching for all devices...");
            
            // 【修正】フィルタリングを解除し、周囲の全デバイスを表示させる
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            setStatus("Connecting to " + (device.name || "Unknown Device") + "...");
            const server = await device.gatt.connect();

            setStatus("Fetching Service...");
            const service = await server.getPrimaryService(SERVICE_UUID);

            setStatus("Fetching Characteristic...");
            return await service.getCharacteristic(CHARACTERISTIC_UUID);
        }

        document.getElementById('readBtn').addEventListener('click', async () => {
            try {
                const char = await getCharacteristic();
                setStatus("Reading configuration...");
                const value = await char.readValue();
                const str = new TextDecoder().decode(value);
                const parts = str.split(',');
                if (parts.length >= 4) {
                    document.getElementById('ssid').value = parts[0];
                    document.getElementById('pass').value = parts[1];
                    document.getElementById('ip').value   = parts[2];
                    document.getElementById('dev').value  = parts[3];
                    setStatus("Configuration loaded successfully", "#27ae60");
                } else {
                    setStatus("Error: Invalid data format received", "#d63031");
                }
            } catch (e) {
                setStatus("Connection Error: " + e.message, "#d63031");
            }
        });

        document.getElementById('writeBtn').addEventListener('click', async () => {
            try {
                const sendText = [
                    document.getElementById('ssid').value,
                    document.getElementById('pass').value,
                    document.getElementById('ip').value,
                    document.getElementById('dev').value
                ].join(',');

                const char = await getCharacteristic();
                setStatus("Transferring settings...");
                await char.writeValue(new TextEncoder().encode(sendText));
                setStatus("Transfer success. ESP is rebooting...", "#27ae60");
            } catch (e) {
                setStatus("Transfer Error: " + e.message, "#d63031");
            }
        });
    </script>
</body>
</html>
